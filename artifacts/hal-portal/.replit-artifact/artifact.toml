kind = "web"
previewPath = "/"
title = "HAL Visitor & Device Access Management Portal"
version = "1.0.0"
id = "artifacts/hal-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18865

[services.development]
run = "pnpm --filter @workspace/hal-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hal-portal", "run", "build" ]
publicDir = "artifacts/hal-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18865"
BASE_PATH = "/"
